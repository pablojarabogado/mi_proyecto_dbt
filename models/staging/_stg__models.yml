version: 2
models:

  - name: obt_exchange_rates
    description: "Tabla OBT con tasas de cambio"
    columns:

    - name: base_currency
      description: "Moneda base"
      tests:
        - not_null

    - name: target_currency
      description: "Moneda destino"
      tests:
        - not_null
        - dbt_expectations.expect_column_values_to_match_regex:
           arguments:
             regex: "^[A-Z]{3}$"
    - name: exchange_rate
      description: "Valor del tipo de cambio"
      tests:
        - not_null
    - name: exchange_rate
      tests:
        - dbt_expectations.expect_column_values_to_be_between:
           arguments:
             min_value: 0
             strictly: true

    - name: region
      tests:
        - dbt_expectations.expect_column_values_to_be_of_type:
            column_type: varchar

    - name: subregion
      tests:
        - dbt_expectations.expect_column_value_lengths_to_be_between:
           arguments:
             min_value: 0
             max_value: 150

    - name: base_currency
      tests:
        - dbt_expectations.expect_column_values_to_not_be_null:
            arguments: {}
    